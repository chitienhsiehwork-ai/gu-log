name: Nightly Deep Check

on:
  schedule:
    # Every day at 03:15 UTC
    - cron: '15 3 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-deep
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Build first (shared dependency for visual-test / lighthouse / budget / links) ──
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm

      - name: Cache Astro incremental state
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro
            .astro
          key: astro-nightly-${{ runner.os }}-${{ hashFiles('astro.config.*', 'src/content/config.ts') }}-${{ github.sha }}
          restore-keys: |
            astro-nightly-${{ runner.os }}-

      - name: Build
        run: pnpm run build

      - name: Upload dist for downstream jobs
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  # ─── Visual regression / screenshot sweep ───────────────────────────
  visual-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium (with system deps)
        # Browser binary may be cached, but --with-deps still pulls apt packages
        # if the runner image doesn't have them — that part is not cacheable.
        run: pnpm exec playwright install chromium --with-deps

      - name: Run visual test
        run: pnpm run test:visual

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-screenshots
          path: .playwright-cli/report/
          retention-days: 7

  # ─── Lighthouse Audit ─────────────────────────────────────────────
  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install Chrome for Lighthouse
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Run Lighthouse CI (static dist)
        run: pnpm run lighthouse

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: quality/lighthouse-reports/
          retention-days: 30

  # ─── Full Security Audit (no build dependency) ────────────────────
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: Full security audit (with history recording)
        run: bash scripts/security-audit.sh
      - name: Security gate (allowlist-aware)
        run: node scripts/security-gate.mjs
      - name: Upload audit history
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-audit-history
          path: quality/security-audit-history.json
          retention-days: 30

  # ─── Dependency Freshness ─────────────────────────────────────────
  dependency-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: Check dependency freshness
        run: pnpm run deps:report

  # ─── Bundle Budget Record (history ratchet) ──────────────────────
  bundle-budget-record:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Record bundle history
        run: node scripts/bundle-budget-check.mjs --record
      - name: Upload bundle history
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-size-history-${{ github.run_id }}
          path: quality/bundle-size-history.json
          retention-days: 30

  # ─── Full Link Check (internal + external with baseline ratchet) ──
  link-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Full link check (internal + external)
        run: pnpm run links:check -- --ci

  # ─── Notify on failure (aggregate, single Telegram ping) ──────────
  notify-failure:
    runs-on: ubuntu-latest
    needs:
      - visual-test
      - lighthouse
      - security-audit
      - dependency-freshness
      - bundle-budget-record
      - link-check
    if: failure()
    steps:
      - name: Collect failed jobs
        id: failed
        run: |
          declare -A jobs=(
            [visual-test]='${{ needs.visual-test.result }}'
            [lighthouse]='${{ needs.lighthouse.result }}'
            [security-audit]='${{ needs.security-audit.result }}'
            [dependency-freshness]='${{ needs.dependency-freshness.result }}'
            [bundle-budget-record]='${{ needs.bundle-budget-record.result }}'
            [link-check]='${{ needs.link-check.result }}'
          )
          failed=""
          for name in "${!jobs[@]}"; do
            if [ "${jobs[$name]}" = "failure" ]; then
              failed="${failed}• ${name}%0A"
            fi
          done
          echo "failed_jobs=${failed}" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TG_TOKEN" ] && echo "No TG token, skip" && exit 0
          MSG="🌙 *Nightly Deep Check FAILED*%0A%0A${{ steps.failed.outputs.failed_jobs }}%0A[查看 CI](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d message_thread_id=4 \
            -d parse_mode=Markdown \
            -d text="${MSG}" > /dev/null
