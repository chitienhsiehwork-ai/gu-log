name: Nightly Deep Check

on:
  schedule:
    # Every day at 03:15 UTC
    - cron: '15 3 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-deep
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Baseline freshness gate ──────────────────────────────────────
  # coverage-ratchet and link-check can't push their refreshed baseline
  # straight to main (branch protection) or open a PR for it (this repo's
  # Actions permissions block Actions-created PRs — a repo-owner setting,
  # see the "Stage ... baseline refresh" steps below for the full story).
  # They instead push to a fixed staging branch, which means the
  # committed baseline on main only moves when a human (or the next agent
  # session) turns that staging branch into a merged PR. This job makes
  # that dependency itself the visible, actionable signal instead of
  # letting the baseline silently drift stale again like it did before
  # this fix (broken-links: unnoticed for a month; coverage: unnoticed for
  # 5 months).
  baseline-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Check committed baseline age
        run: node scripts/check-nightly-baseline-freshness.mjs

  # ─── Build first (shared dependency for visual-test / lighthouse / budget / links) ──
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm

      - name: Cache Astro incremental state
        uses: actions/cache@v6
        with:
          path: |
            node_modules/.astro
            .astro
          key: astro-nightly-${{ runner.os }}-${{ hashFiles('astro.config.*', 'src/content.config.ts', 'src/plugins/**') }}-${{ github.sha }}
          restore-keys: |
            astro-nightly-${{ runner.os }}-

      - name: Build
        run: pnpm run build

      - name: Upload dist for downstream jobs
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  # ─── Visual regression / screenshot sweep ───────────────────────────
  visual-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium (with system deps)
        # Browser binary may be cached, but --with-deps still pulls apt packages
        # if the runner image doesn't have them — that part is not cacheable.
        run: pnpm exec playwright install chromium --with-deps

      - name: Run visual test
        run: pnpm run test:visual

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-screenshots
          path: .playwright-cli/report/
          retention-days: 7

  # ─── Lighthouse Audit ─────────────────────────────────────────────
  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install Chrome for Lighthouse
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Run Lighthouse CI (static dist)
        run: pnpm run lighthouse

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: quality/lighthouse-reports/
          retention-days: 30

  # ─── Full Security Audit (no build dependency) ────────────────────
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - name: Full security audit (with history recording)
        run: bash scripts/security-audit.sh
      - name: Security gate (allowlist-aware)
        run: node scripts/security-gate.mjs
      - name: Upload audit history
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-audit-history
          path: quality/security-audit-history.json
          retention-days: 30

  # ─── Dependency Freshness ─────────────────────────────────────────
  dependency-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - name: Check dependency freshness
        run: pnpm run deps:report

  # ─── Bundle Budget Record (history ratchet) ──────────────────────
  bundle-budget-record:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Record bundle history
        run: node scripts/bundle-budget-check.mjs --record
      - name: Upload bundle history
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-size-history-${{ github.run_id }}
          path: quality/bundle-size-history.json
          retention-days: 30

  # ─── Playwright Coverage Ratchet ──────────────────────────────────
  # Runs the stable Playwright spec subset with monocart V8 coverage
  # collection (configured in playwright.config.ts), uploads the report,
  # and runs scripts/coverage-ratchet.sh — which compares to baseline,
  # ratchets the baseline up on improvements, and fails the job on a
  # >5% regression. Non-blocking by design (continue-on-error) until the
  # baseline shape stabilises across both vitest + playwright runs.
  coverage-ratchet:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright Chromium (with system deps)
        run: pnpm exec playwright install chromium --with-deps
      - name: Run stable Playwright tests with coverage
        run: |
          pnpm exec playwright test \
            --project="Desktop Chrome" \
            tests/content-integrity.spec.ts \
            tests/search.spec.ts \
            tests/no-tables-mobile.spec.ts \
            tests/sd-source-citation.spec.ts \
            tests/component-smoke.spec.ts \
            tests/a11y-baseline.spec.ts \
            tests/theme-parity.spec.ts \
            tests/api-endpoints.spec.ts \
            tests/snapshots.spec.ts \
            tests/color-contrast.spec.ts
      - name: Upload coverage report (HTML + JSON)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ github.run_id }}
          path: quality/coverage/
          retention-days: 14
      - name: Run coverage ratchet (advisory)
        run: bash scripts/coverage-ratchet.sh
      - name: Stage coverage baseline + history refresh
        # main's branch protection has an empty bypass_actors list (verified
        # via the Rulesets API) — no push, not even from Actions, lands there
        # directly. Opening a PR isn't an option either: this repo's Actions
        # permissions have "create and approve pull requests" disabled
        # (gh api .../actions/permissions/workflow → can_approve_pull_request_reviews:
        # false), which is a repo-owner security setting no workflow-level
        # `permissions:` block can override — confirmed by hitting
        # "GitHub Actions is not permitted to create or approve pull requests"
        # on a live dispatch run. So this pushes the fresh file to a fixed
        # staging branch instead — but never force-pushes it (see
        # scripts/nightly-baseline-stage.sh): if that branch already has
        # unmerged progress sitting on it, this leaves it alone rather than
        # clobbering it. A human or the next agent session turns it into a
        # real PR with one command once the staleness check (below) goes red:
        #   gh pr create --base main --head nightly/coverage-baseline-staging && gh pr merge --auto --squash
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: |
          bash scripts/nightly-baseline-stage.sh \
            nightly/coverage-baseline-staging \
            "chore(quality): update coverage ratchet baseline + history" \
            quality/coverage-baseline.json quality/coverage-history.json

  # ─── Full Link Check (internal + external with baseline ratchet) ──
  link-check:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Full link check (internal + external)
        run: pnpm run links:check -- --ci
      - name: Stage broken-links baseline refresh
        # Runs even when the check step above exits 1/2 (new breakage found) —
        # the baseline must still move forward so tomorrow's run only flags
        # genuinely NEW breakage instead of re-flagging tonight's known ones.
        # Also runs (harmlessly) on the scan's own exit 3 (fatal/unknown
        # error, fail-closed) — check-links.mjs only writes
        # broken-links-baseline.json once, at the very end after a full
        # successful scan, so a fatal exit means that write never happened
        # and this step's git diff --quiet correctly no-ops instead of
        # staging a baseline built from an incomplete scan.
        # Pushes to a fixed staging branch instead of opening a PR — see the
        # coverage-ratchet job's "Stage coverage baseline..." step for why
        # (main's branch protection blocks direct pushes, and this repo's
        # Actions permissions block Actions-created PRs; that's a repo-owner
        # setting, not something this workflow can fix). Never force-pushes
        # (see scripts/nightly-baseline-stage.sh): if the branch already has
        # unmerged progress on it, this leaves it alone. Same one-command
        # follow-up once the staleness check goes red:
        #   gh pr create --base main --head nightly/links-baseline-staging && gh pr merge --auto --squash
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: |
          bash scripts/nightly-baseline-stage.sh \
            nightly/links-baseline-staging \
            "chore(quality): refresh broken-links baseline" \
            quality/broken-links-baseline.json

  # ─── Notify on failure (aggregate, single Telegram ping) ──────────
  notify-failure:
    runs-on: ubuntu-latest
    needs:
      - visual-test
      - lighthouse
      - security-audit
      - dependency-freshness
      - bundle-budget-record
      - link-check
      - coverage-ratchet
      - baseline-freshness
    if: failure()
    steps:
      - name: Collect failed jobs
        id: failed
        run: |
          declare -A jobs=(
            [visual-test]='${{ needs.visual-test.result }}'
            [lighthouse]='${{ needs.lighthouse.result }}'
            [security-audit]='${{ needs.security-audit.result }}'
            [dependency-freshness]='${{ needs.dependency-freshness.result }}'
            [bundle-budget-record]='${{ needs.bundle-budget-record.result }}'
            [link-check]='${{ needs.link-check.result }}'
            [coverage-ratchet]='${{ needs.coverage-ratchet.result }}'
            [baseline-freshness]='${{ needs.baseline-freshness.result }}'
          )
          failed=""
          for name in "${!jobs[@]}"; do
            if [ "${jobs[$name]}" = "failure" ]; then
              failed="${failed}• ${name}%0A"
            fi
          done
          echo "failed_jobs=${failed}" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TG_TOKEN" ] && echo "No TG token, skip" && exit 0
          MSG="🌙 *Nightly Deep Check FAILED*%0A%0A${{ steps.failed.outputs.failed_jobs }}%0A[查看 CI](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d message_thread_id=4 \
            -d parse_mode=Markdown \
            -d text="${MSG}" > /dev/null
