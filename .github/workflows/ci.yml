name: PR Fast Gate

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel superseded runs for the same PR/branch so pushes don't queue.
concurrency:
  group: fast-gate-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions. `contents: read` for checkout; nothing else needed now
# that dependency-review (which wanted pull-requests: write for PR comments)
# is removed. See the "Re-enabling dependency-review" block at the bottom of
# this file for what to restore if Dependency Graph gets enabled.
permissions:
  contents: read

# ─── Design note: build vs checks parallelism ──────────────────────────────
# build runs in parallel with every fast check (lint / type-check / contrast
# / validate-content / security-gate / unit-tests). A fast check failing
# does NOT cancel the in-flight build, so we pay the full ~2 min of build
# runner minutes even when lint errors in 10s. For a solo-author public repo
# that's fine (GitHub Actions is free on public repos and wall-time for the
# iterating author matters more than idle runner minutes). If this repo ever
# goes private or the runner-minute cost starts to bite, add:
#   needs: [lockfile-consistency, lint]
# to `build` — those two are the cheapest fail-fast gates.
# ────────────────────────────────────────────────────────────────────────────

jobs:
  # ─── Tier 1: independent checks (all run in parallel) ────────────────────
  lockfile-consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      # `pnpm install --frozen-lockfile` inside the composite already fails
      # on any lockfile drift; this diff catches the narrower case of a
      # post-install lockfile rewrite (shouldn't happen, but cheap to check).
      - name: Sanity check — lockfile byte-identical after install
        run: git diff --exit-code -- pnpm-lock.yaml
      - name: Ensure npm lockfile not tracked
        run: test ! -f package-lock.json

  # ─── advisory: openspec 近似唯讀牆（warn-only，不 gate merge）──────────────
  # 見 .agents/openspec-sdlc.md〈階段 6：收斂與 escalation〉。script 一律 exit 0，
  # 不在 ci-passed.needs 裡，純提示。證明不誤殺一段時間後，把 script 尾 violations>0
  # 分支改 exit 1 + 加進 ci-passed.needs，才升為 blocking gate。
  openspec-wall:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Fetch base
        run: git fetch --no-tags origin main
      - name: 近似唯讀牆（spec delta 是否被夾帶進實作 commit）
        run: bash scripts/check-spec-impl-separation.sh origin/main

  # ─── blocking: OpenSpec archive-before-merge lifecycle gate ───────────────
  # Always present so ci-passed can positive-match it. Push and draft PR runs
  # take an explicit step-level no-op; a ready PR validates only the event's
  # exact committed base/head trees.
  openspec-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Archive gate not applicable to push or draft PR
        if: github.event_name == 'push' || github.event.pull_request.draft == true
        run: echo "OpenSpec archive validation is deferred for push and draft PR runs."

      - name: Checkout exact PR head
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Fetch and verify exact event commits
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          actual_head="$(git rev-parse HEAD)"
          if [ "$actual_head" != "$HEAD_SHA" ]; then
            echo "::error::Checkout HEAD $actual_head does not match event head $HEAD_SHA."
            exit 1
          fi
          git fetch --no-tags origin "$BASE_SHA"
          git cat-file -e "$BASE_SHA^{commit}"
          git cat-file -e "$HEAD_SHA^{commit}"

      - name: Validate OpenSpec archive lifecycle
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/check-openspec-archive.mjs --base "$BASE_SHA" --head "$HEAD_SHA"

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      - name: ESLint
        run: pnpm run lint
      - name: Prettier check
        run: pnpm run format:check

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      - name: Astro type check
        run: pnpm exec astro check
      - name: Vercel middleware type check
        run: pnpm run check:middleware

  contrast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      - name: WCAG AA contrast check
        run: pnpm run check:contrast

  validate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Need history + base ref so the translation-pair gate can
          # diff "newly added in this PR" against the base branch.
          fetch-depth: 0
      - uses: ./.github/actions/setup-pnpm
      - name: Validate posts (frontmatter + content policy)
        run: pnpm run validate:posts
      - name: Block retired brand taxonomy contracts
        run: pnpm run taxonomy:check
      - name: Dedup check (block active duplicates)
        run: node scripts/validate-posts.mjs --check-duplicates

      - name: Reader revision manifest freshness (blocking)
        # Content-derived hash check — no git history needed, safe on any
        # checkout depth. Guards repo hygiene: committed manifest must match
        # posts content (prod builds regenerate it via fail-closed prebuild).
        run: node scripts/build-reader-revision-manifest.mjs --check

      - name: Translation pair gate (PR only — block new GP/MP/SD/Lv missing zh-tw or en)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          node scripts/check-translation-pairs.mjs --strict --pr-base=${{ github.base_ref }}

      - name: 晶晶體 check (PR only — block decorative English in changed zh-tw posts)
        # Same scope as the pre-commit hook (.githooks/pre-commit step 0.16):
        # only PR-changed zh-tw .mdx files are linted. Push to main is skipped
        # because (a) merged content was already gated at PR time and (b) main
        # has 65+ historical posts with grandfathered 晶晶體 that we don't
        # retroactively block. Manual ralph sweep can clean those over time.
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1 || true
          CHANGED_MDX=$(node scripts/list-content-gate-posts.mjs --base=origin/${{ github.base_ref }})
          if [ -z "$CHANGED_MDX" ]; then
            echo "✓ No zh-tw posts changed in this PR — skipping 晶晶體 check"
            exit 0
          fi
          echo "Checking $(echo $CHANGED_MDX | wc -w) zh-tw post(s) for 晶晶體..."
          node scripts/check-jingjing.mjs $CHANGED_MDX

  pending-ticket-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Block PENDING posts from main
        run: |
          set -eu
          pending_files="$(find src/content/posts -type f -name '*-pending-*.mdx' -print | sort)"
          pending_ticket_ids="$(grep -RInE '^[[:space:]]*ticketId:[[:space:]]*["'\'']?[A-Za-z]+-PENDING["'\'']?[[:space:]]*$' src/content/posts --include='*.mdx' || true)"

          if [ -n "$pending_files" ] || [ -n "$pending_ticket_ids" ]; then
            echo "::error::PENDING posts cannot land on main. Follow CONTRIBUTING.md §編號分配（PENDING ticket pattern） and run scripts/allocate-ticket.mjs before merge."
            if [ -n "$pending_files" ]; then
              echo "PENDING filenames:"
              printf '%s\n' "$pending_files"
            fi
            if [ -n "$pending_ticket_ids" ]; then
              echo "PENDING ticketId values:"
              printf '%s\n' "$pending_ticket_ids"
            fi
            exit 1
          fi

          echo "No PENDING posts found."

  security-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      - name: Security gate (block new high/critical)
        run: pnpm run security:gate

  # Blocking secret scan — same tool/config as the local pre-commit hook
  # (scripts/hooks/pre-commit step -1), but hooks only fire on machines that
  # have gitleaks installed; this is the backstop that can't be skipped.
  # Uses .gitleaks.toml at repo root (auto-detected by the action). No
  # GITLEAKS_LICENSE needed — this is a personal-account repo, not an org.
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Job only has contents: read (see top-of-file minimal-permissions
          # note) — no pull-requests: write, so PR-comment mode would just
          # 403 silently. Detection still fails the job either way; disable
          # the comment feature explicitly instead of relying on that.
          GITLEAKS_ENABLE_COMMENTS: false

  unit-tests:
    runs-on: ubuntu-latest
    # vitest run is fast (~5s locally) but tribunal-v2/pipeline.test.ts spawns
    # subprocesses; cap the job so a hung test can't eat 6h of runner time.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      - name: Install ShellCheck for hook regression
        run: sudo apt-get update && sudo apt-get install --no-install-recommends shellcheck
      - name: Vitest unit tests
        run: pnpm exec vitest run --reporter=default

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm

      - name: Cache Astro incremental state
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            node_modules/.astro
            .astro
          # Key covers everything `astro build` reads from config or plugins.
          # If you add a new config file or plugin location, add it here or
          # stale incremental state may leak between builds.
          key: astro-${{ runner.os }}-${{ hashFiles('astro.config.*', 'src/content.config.ts', 'src/plugins/**') }}-${{ github.sha }}
          restore-keys: |
            astro-${{ runner.os }}-${{ hashFiles('astro.config.*', 'src/content.config.ts', 'src/plugins/**') }}-
            astro-${{ runner.os }}-

      - name: Build
        run: pnpm run build

      - name: Upload dist for downstream jobs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  # ─── Spec ownership gate ───────────────────────────────────────────────
  # See tests/spec-ownership.json + scripts/check-spec-ownership.mjs. Fails
  # if any tests/*.spec.ts is unowned, multiply-classified, stale, has an
  # unconditional skip while classified blocking/nightly, an expired
  # quarantine, or if any workflow hand-lists a spec path instead of
  # consuming `--list <class>`. This is what stops a spec from silently
  # falling out of every workflow again (the #585 finding: ~29 of 40 specs
  # were referenced nowhere). Node-only script — no pnpm install needed.
  spec-ownership:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
      - name: Verify Playwright spec ownership
        run: node scripts/check-spec-ownership.mjs

  # ─── Core interaction blocking gate ─────────────────────────────────────
  # Bounded, stable, fast set of specs promoted out of the "referenced by
  # nothing" pile (#585 P1-3). Selection criteria: verified green in
  # isolation, no live network dependency (mocked routes only), core reader
  # interactions (search, TOC, login CTA, cross-page smoke, viewport
  # overflow). See tests/spec-ownership.json for the full
  # blocking/nightly/quarantined classification and per-spec reasoning.
  # The spec list is generated from the registry via --list blocking, not
  # hand-copied, so it can never silently drift from the registry's
  # classification. --retries=0 here (global config defaults to 2 in CI)
  # so a newly-flaky promoted spec fails loudly on the first PR that hits
  # it instead of being retried into a false green.
  e2e-core:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Chromium
        run: pnpm exec playwright install chromium --with-deps
      - name: Run core interaction specs (blocking)
        # Checked assignment, not an inline $(...) — bash -e does not check
        # the exit code of a command substitution used as bare arguments, so
        # a --list failure (bad registry, zero matches, script crash) would
        # silently expand to nothing and Playwright would run every spec in
        # the project instead of failing the step. `SPECS=$(...)` assigns
        # the exit code to the assignment itself, which -e does check.
        # $SPECS is intentionally unquoted below (word-splits into multiple
        # file args); the registry only ever produces tests/*.spec.ts paths.
        run: |
          set -euo pipefail
          SPECS=$(node scripts/check-spec-ownership.mjs --list blocking)
          pnpm exec playwright test --project="Desktop Chrome" --retries=0 $SPECS

  # ─── Tier 2: jobs that consume dist/ ──────────────────────────────────────
  internal-links:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Check internal links
        run: pnpm run links:check -- --internal-only --ci

  bundle-budget:
    # PR-level bundle budget gate — fails if blocking budgets are violated.
    # Nightly still runs with --record to append history; here we check only.
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Bundle budget check (no history write)
        run: pnpm run bundle:check

  # ─── Aggregate gate for branch protection ─────────────────────────────────
  # Point required status checks at this single job instead of each leaf job.
  # Adding or renaming a leaf no longer requires a protection-rule edit.
  ci-passed:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lockfile-consistency
      - lint
      - type-check
      - contrast
      - validate-content
      - pending-ticket-guard
      - security-gate
      - gitleaks
      - unit-tests
      - build
      - internal-links
      - bundle-budget
      - spec-ownership
      - e2e-core
      - openspec-archive
    steps:
      - name: Verify every required job succeeded
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          # Positive-match semantics: every leaf job's result MUST be "success".
          # success / failure / cancelled / skipped — only success passes. This
          # is the conservative choice: a skip from an `if:` shortcut or a
          # cancel-in-progress race would silently slip through a failure-only
          # check, leaving branch protection green on an incomplete run.
          #
          # Parse with jq, never grep: toJSON(needs) pretty-prints with a space
          # after the colon (`"result": "success"`), so a colon-tight grep
          # counts 0 matches on both sides and 0 == 0 passes forever.
          # The total-is-zero guard below fails closed on that whole bug class.
          echo "$RESULTS"
          passed=$(printf '%s' "$RESULTS" | jq '[.[] | select(.result == "success")] | length')
          total=$(printf '%s' "$RESULTS" | jq 'length')
          echo "Success: $passed / $total"
          if [ "$total" -eq 0 ]; then
            echo "::error::Parsed zero jobs from the needs context — the gate itself is miswired; failing closed."
            exit 1
          fi
          if [ "$passed" != "$total" ]; then
            echo "::error::One or more required jobs did not succeed (failure / cancelled / skipped)."
            exit 1
          fi
          echo "All required jobs passed."

# ─── Re-enabling dependency-review (currently disabled) ────────────────────
# The dependency-review-action requires the repo-level setting
# Settings → Code security → Dependency graph. Without it the action errors
# out ("Dependency review is not supported on this repository.") so the job
# was removed entirely on this branch — a disabled-but-present job adds UI
# noise without buying security.
#
# To re-enable once Dependency Graph is on:
#   1. Restore permissions → add `pull-requests: write` at the top of this
#      file (dep-review's comment-summary-in-pr needs it).
#   2. Add back this job alongside `security-gate`:
#
#        dependency-review:
#          if: github.event_name == 'pull_request'
#          runs-on: ubuntu-latest
#          timeout-minutes: 5
#          steps:
#            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
#            - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
#              with:
#                fail-on-severity: moderate
#                comment-summary-in-pr: on-failure
#
#   3. Add `dependency-review` to the `ci-passed.needs` list.
# ────────────────────────────────────────────────────────────────────────────
