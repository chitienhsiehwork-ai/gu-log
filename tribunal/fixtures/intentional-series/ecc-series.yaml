inputPost:
  slug: sp-151-20260402-ecc-eval-driven-development
  frontmatter:
    ticketId: SP-151
    title: "Eval-Driven Development — 你測你的 code，但誰測你的 AI？"
    originalDate: "2026-04-01"
    translatedDate: "2026-04-02"
    source: "@affaanmustafa on GitHub"
    sourceUrl: "https://github.com/affaan-m/everything-claude-code"
    lang: zh-tw
    series:
      name: "Everything Claude Code 全解析"
      order: 6
    summary: "你用 unit test 測你的 code，用 CI 保護你的 pipeline。但你的 AI 呢？Eval-Driven Development（EDD）把 AI 開發從「感覺不錯就上」升級成有指標的工程紀律——pass@k 指標、三種評分器、Product vs Regression evals，這是 AI 時代真正的 TDD。"
  contentSnapshot: |
    上週你讓 Claude Code 幫你寫了一個功能，跑起來很漂亮，你很滿意。這週你用類似
    的需求要它再做一次。結果讓你皺眉。不是爛到無法用，但就是少了什麼——邏輯鬆散，
    edge case 沒想到。

    這個問題有個名字，叫做不一致性問題，也就是工程師在 AI 工具上卡關最多的地方。
    你的 unit test 告訴你「這段 code 對不對」，但它不告訴你「這個 AI 再跑一次，
    還對不對」。你在用感覺飛行。

    Affaan Mustafa 的 Everything Claude Code 裡有一個 eval-harness skill，試圖
    解決這件事。它背後的思路叫做 Eval-Driven Development（EDD）——把 AI 開發從
    vibes-based 拉回到 metrics-based。TDD 的核心是先寫測試定義「成功」，EDD 的
    邏輯完全一樣，只是被測試的對象換了——不是你寫的 code，而是幫你寫 code 的 AI
    本身。

