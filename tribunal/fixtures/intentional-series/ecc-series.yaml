  - slug: sp-143-20260402-ecc-autonomous-loops
    frontmatter:
      ticketId: SP-143
      title: "你不需要一直盯著 Claude Code — ECC 的六種自動化模式全解析"
      originalDate: "2026-04-01"
      translatedDate: "2026-04-02"
      source: "@affaanmustafa on GitHub"
      sourceUrl: "https://github.com/affaan-m/everything-claude-code"
      lang: zh-tw
      series:
        name: "Everything Claude Code 全解析"
        order: 1
      summary: "Everything Claude Code 把 AI 自動化開發整理成六個層級：從最基本的 Sequential Pipeline 到最複雜的 RFC-Driven DAG。"
    contentSnapshot: |
      下午三點，你把一個任務交給 Claude Code，然後去開了兩個小時的會。回來的時候，
      terminal 還在跑。它已經完成了 —— 連 PR 都開好了，CI 通過。

      大部分人用 Claude Code 的方式是手動的：下一個指令，等它跑完，看結果，下一個
      指令。Everything Claude Code（ECC）有一份 skills/autonomous-loops/SKILL.md，
      把 AI 自動化開發整理成了六個層級：Sequential Pipeline / NanoClaw REPL /
      Infinite Agentic Loop / Continuous PR Loop / De-Sloppify / RFC-Driven DAG。

      核心假設：任務必須是明確的、可驗證的、有明確的完成條件。縮小 scope、鎖死
      邊界、有驗證機制 —— 這是「自動化」和「失控」的分水嶺。
  - slug: sp-144-20260402-ecc-instinct-system
    frontmatter:
      ticketId: SP-144
      title: "AI 犯了錯，你糾正，它記住了 — ECC 的 Instinct System 自我學習架構"
      originalDate: "2026-04-01"
      translatedDate: "2026-04-02"
      source: "@affaanmustafa on GitHub"
      sourceUrl: "https://github.com/affaan-m/everything-claude-code"
      lang: zh-tw
      series:
        name: "Everything Claude Code 全解析"
        order: 2
      summary: "Everything Claude Code 的 Instinct System 把 AI 每次用到的行為模式蒸餾成「本能」：有信心分數、有專案隔離、有跨專案升級機制。"
    contentSnapshot: |
      你上週糾正了 Claude Code 一次。「不要用 class component，我們這個專案全都
      是 functional。」Claude 道歉，修了。然後這週，你開了一個新 session，它又用
      class component 了。

      每個 Claude Code session 從零開始，不帶任何上一個 session 的記憶。你只有
      兩個選擇：在 CLAUDE.md 裡手動寫下每一條規則，或者每次都重新教一遍。

      Everything Claude Code 的 Instinct System 想做的，是把這件事翻過來。在 ECC
      的設計裡，Instinct（本能）是一個原子行為單位 —— 一個觸發條件，一個對應
      行動，加上一個信心分數。隨使用逐步累積，跨專案可升級成通用規則。
