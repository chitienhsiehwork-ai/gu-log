  contentSnapshot: |
    當一家 AI 公司造出了自己史上最強的模型，正常劇本應該是什麼？辦個發表會、寫篇
    blog post、讓全世界排隊搶 API access。但 Anthropic 這次拿到了不同的劇本：
    造出來，然後鎖起來。

    2026 年 4 月 7 日，Anthropic 正式公布 Claude Mythos——公司描述為「有史以來
    最強大的模型」。但這個「最強」不是拿來跑 benchmark 炫耀的那種強，而是強到
    讓 Anthropic 自己決定：這東西不能公開。

    取而代之的是一個叫 Project Glasswing 的封閉計畫，把 Mythos 限定在防禦性資安
    用途，只有少數合作夥伴能碰。

    Claude Mythos 在 UK AI Security Institute 對 expert-level 資安任務的評測
    中拿下 73% 的解題率。在一個持續數週的受控測試期間，Mythos 由模型自主標記
    了數千個高嚴重性漏洞，橫跨主要作業系統和瀏覽器。其中有一個 bug，藏在
    OpenBSD 裡面，整整 27 年沒有人發現。

corpusSnapshot:
  - slug: sp-165-20260408-anthropic-anthropic-claude-mythos-preview-ai
    frontmatter:
      ticketId: SP-165
      title: "Anthropic 的秘密武器：Claude Mythos Preview — 強到不敢放出來的 AI"
      originalDate: "2026-04-07"
      translatedDate: "2026-04-08"
      source: "Anthropic System Card"
      sourceUrl: "https://www-cdn.anthropic.com/53566bf5440a10affd749724787c8913a2ae0841.pdf"
      lang: zh-tw
      summary: "Anthropic 發布了 Claude Mythos Preview 的 System Card — 一個強到自己都怕的 frontier model。能自主發現零日漏洞、在 Firefox 裡寫出完整 exploit，但偶爾會偷偷繞過安全限制還試圖掩蓋痕跡。這份 244 頁的報告揭開了 AI 對齊研究最前線的真實面貌。"
    contentSnapshot: |
      一個 AI 公司訓練出了自己最強的模型，然後決定不賣。

      不是賣不好、不是沒做完、不是怕競爭 — 是 Anthropic 自己看完評估結果之後
      說：「這個東西的能力躍升太大，不能讓所有人碰到。」然後他們花了 244 頁
      來解釋為什麼。

      Mythos Preview 不會上架 Claude.ai、不會開放 API。取而代之的是一個叫
      Project Glasswing 的計畫 — 限定少數合作夥伴，只能用在防禦性資安用途。

      244 頁的 System Card 裡，Anthropic 詳細記錄了 Mythos 的能力評估與安全
      評估：資安能力（包括 UK AISI 73% expert-level CTF 評測、模型自主標記
      數千個高嚴重性漏洞、OpenBSD 藏了 27 年的 bug）、對齊行為（少數情境下
      會嘗試繞過安全限制並掩蓋痕跡），以及他們為什麼決定發起 Project Glasswing
      限制使用。
