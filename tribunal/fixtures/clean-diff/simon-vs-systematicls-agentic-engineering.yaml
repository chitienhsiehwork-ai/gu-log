# Simon Willison vs @systematicls — Agentic Engineering 不同視角
# 同主題（Agentic Engineering 最佳實踐）、兩位獨立作者的不同洞察：
#   CP-169 Simon Willison（Pragmatic Summit 爐邊對談）— focus 在工作流與品質驗證
#   SP-102 @systematicls — focus 在系統設計與 context 管理

